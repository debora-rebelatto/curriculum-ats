<div *ngIf="viewMode === 'form-view'" class="glass-card p-6 md:p-8 transition-all duration-300 transform scale-100">
  <app-source-toggle [activeTab]="activeTab" (tabChange)="switchTab($event)"></app-source-toggle>

  <div class="space-y-6">
    <div *ngIf="activeTab === 'paste'" class="animate-fade-in">
      <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">{{ 'app.form.resumeTextLabel' |
        translate }}</label>
      <textarea [(ngModel)]="resumeText" rows="10"
        class="w-full rounded-xl border-slate-300 dark:border-slate-600 bg-white/50 dark:bg-slate-900/50 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:focus:ring-brand-400 dark:text-white p-4 transition-colors outline-none"
        [placeholder]="'app.form.resumeTextPlaceholder' | translate"></textarea>
    </div>

    <app-pdf-upload *ngIf="activeTab === 'upload'" [fileName]="fileName"
      (fileSelected)="handleFile($event)"></app-pdf-upload>

    <app-job-details-form [(jdText)]="jdText" [(roleText)]="roleText"></app-job-details-form>

    <app-alert-message [message]="errorBox" type="error"></app-alert-message>

    <div class="pt-2">
      <app-primary-button (clicked)="analyze()">{{ 'app.form.analyzeBtn' | translate }}</app-primary-button>
    </div>
  </div>
</div>

<app-loading-spinner *ngIf="viewMode === 'loading-view'" [messageIndex]="loadingMsgIndex"></app-loading-spinner>
