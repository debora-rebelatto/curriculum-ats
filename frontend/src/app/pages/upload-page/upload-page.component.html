@if (viewMode === 'form-view') {
<div class="p-6 md:p-8 transition-all duration-300 transform scale-100">
  <app-source-toggle [activeTab]="activeTab" (tabChange)="switchTab($event)"></app-source-toggle>
  <div class="flex flex-col gap-10 mt-6">
    @if (activeTab === 'upload') {
    <div class="animate-fade-in">
      <app-pdf-upload [fileName]="fileName" (fileSelected)="handleFile($event)"></app-pdf-upload>
    </div>
    }
    @if (activeTab === 'paste') {
    <div class="animate-fade-in">
      <app-text-paste [(resumeText)]="resumeText"></app-text-paste>
    </div>
    }
    <div class="pt-4 border-t border-slate-100 dark:border-slate-800/50">
      <app-job-details-form [(jdText)]="jdText" [(roleText)]="roleText"></app-job-details-form>
    </div>
    <app-alert-message [message]="errorBox" type="error"></app-alert-message>
    <div class="pt-2">
      <app-primary-button (clicked)="analyze()">{{ 'app.form.analyzeBtn' | translate }}</app-primary-button>
    </div>
  </div>
</div>
}

@if (viewMode === 'loading-view') {
<app-loading-spinner [messageIndex]="loadingMsgIndex"></app-loading-spinner>
}
