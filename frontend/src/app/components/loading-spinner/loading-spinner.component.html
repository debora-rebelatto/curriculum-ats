<div class="glass-card min-h-[400px] flex flex-col items-center justify-center p-12 text-center">
  <div class="relative w-28 h-28 mb-10">
    <div class="absolute inset-0 rounded-full border-t-4 border-brand-500 animate-spin"
      style="animation-duration: 1.5s;"></div>
    <div class="absolute inset-2 rounded-full border-r-4 border-indigo-400 animate-spin"
      style="animation-duration: 2s; animation-direction: reverse;"></div>
    <div class="absolute inset-4 rounded-full border-b-4 border-sky-300 animate-spin" style="animation-duration: 2.5s;">
    </div>
    <div class="absolute inset-0 flex items-center justify-center"><span class="text-3xl">🤖</span></div>
  </div>
  <h3 class="text-2xl font-outfit font-medium text-slate-800 dark:text-slate-100 transition-all duration-500">
    {{ 'app.loading.msg' + messageIndex | translate }}
  </h3>
  <p class="mt-3 text-slate-500 dark:text-slate-400 text-sm">
    {{ 'app.loading.subtext' | translate }}
  </p>
</div>
