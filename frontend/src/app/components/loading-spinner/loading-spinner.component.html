<div class="app-card min-h-[400px] flex flex-col items-center justify-center p-12 text-center">
  <div class="flex items-center justify-center space-x-3 bg-white dark:bg-slate-800 px-8 py-5 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 mb-10">
    <div
      class="w-3.5 h-3.5 bg-brand-500 rounded-full animate-bounce"
      style="animation-delay: -0.3s"></div>
    <div
      class="w-3.5 h-3.5 bg-indigo-500 rounded-full animate-bounce"
      style="animation-delay: -0.15s"></div>
    <div class="w-3.5 h-3.5 bg-sky-400 rounded-full animate-bounce"></div>
  </div>
  <h3 class="text-2xl font-outfit font-medium text-slate-800 dark:text-slate-100 transition-all duration-500">
    {{ 'app.loading.msg' + messageIndex | translate }}
  </h3>
  <p class="mt-3 text-slate-500 dark:text-slate-400 text-sm">
    {{ 'app.loading.subtext' | translate }}
  </p>
</div>
