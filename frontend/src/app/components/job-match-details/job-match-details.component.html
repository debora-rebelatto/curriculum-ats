@if (details) {
  <div class="app-card p-6 md:p-8">
    <h3 class="text-xl font-outfit font-semibold text-slate-900 dark:text-white mb-4 flex items-center gap-3 border-b border-slate-100 dark:border-slate-800 pb-4">
      <div class="w-8 h-8 rounded-lg bg-warning-100 dark:bg-warning-900/40 flex items-center justify-center text-warning-600 dark:text-warning-400">
        <span class="material-icons text-[20px]">balance</span>
      </div>
      {{ 'app.results.jobMatchTitle' | translate }}
    </h3>
    <p class="text-[15px] leading-relaxed text-slate-700 dark:text-slate-300 p-4 rounded-xl bg-warning-50/50 dark:bg-warning-900/10 border border-warning-100 dark:border-warning-900/30">
      {{ details }}
    </p>
  </div>
}
