<div class="glass-card p-6 md:p-8">
  <h3 class="text-xl font-outfit font-semibold text-slate-900 dark:text-white mb-6 flex items-center gap-3 border-b border-slate-100 dark:border-slate-800 pb-4">
    <div class="w-8 h-8 rounded-lg bg-brand-100 dark:bg-brand-900/40 flex items-center justify-center text-brand-600 dark:text-brand-400">
        <span class="material-icons text-[20px]">analytics</span>
    </div>
    {{ 'app.results.dimensionsTitle' | translate }}
  </h3>
  <div class="space-y-6">
    @for (d of dimensions; track d) {
      <div class="group">
        <div class="flex justify-between items-end mb-2">
          <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ d.name }}</span>
          <span class="text-sm font-bold text-slate-900 dark:text-white">{{ d.score }}%</span>
        </div>
        <div class="w-full bg-slate-100 dark:bg-slate-700/50 rounded-full h-3 overflow-hidden shadow-inner">
          <div class="h-full rounded-full transition-all duration-1000 ease-out relative"
            [ngClass]="d.score >= 75 ? 'bg-gradient-to-r from-emerald-400 to-emerald-500' : (d.score >= 50 ? 'bg-gradient-to-r from-amber-400 to-amber-500' : 'bg-gradient-to-r from-rose-400 to-rose-500')"
            [style.width.%]="d.score">
            <div class="absolute inset-0 bg-white/20 w-full h-full"
              style="background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent); background-size: 1rem 1rem;">
            </div>
          </div>
        </div>
        @if (d.rationale) {
          <p class="text-[13px] text-slate-500 dark:text-slate-400 mt-2.5 leading-relaxed">{{ d.rationale }}</p>
        }
      </div>
    }
  </div>
</div>
