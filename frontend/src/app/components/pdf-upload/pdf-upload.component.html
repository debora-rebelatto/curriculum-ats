<div class="animate-fade-in">
  <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
    {{ 'app.form.resumePdfLabel' | translate }}
  </label>
  <div
    class="mt-1 flex justify-center px-6 pt-10 pb-12 border-2 border-slate-300 dark:border-slate-600 border-dashed rounded-xl cursor-pointer hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-all duration-200 group relative overflow-hidden"
    [class.bg-brand-50]="fileName" [class.dark:bg-slate-800]="fileName" [class.border-brand-300]="fileName"
    (click)="fileInput.click()">
    <div *ngIf="fileName" class="absolute inset-0 bg-brand-500/5 dark:bg-brand-500/10 pointer-events-none"></div>
    <div class="space-y-4 text-center relative z-10">
      <svg class="mx-auto h-16 w-16 text-slate-400 group-hover:text-brand-500 transition-colors duration-200"
        [class.text-brand-500]="fileName" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
        <path
          d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <div class="text-sm text-slate-600 dark:text-slate-400">
        <p class="font-medium text-brand-600 dark:text-brand-400 hover:text-brand-500 transition-colors">
          {{ fileName || ('app.form.resumePdfAction' | translate) }}
        </p>
      </div>
      <p class="text-xs text-slate-500">{{ 'app.form.resumePdfHint' | translate }}</p>
    </div>
  </div>
  <input #fileInput type="file" id="file-input" accept=".pdf" (change)="onFileChange($event)" class="hidden" />
</div>
