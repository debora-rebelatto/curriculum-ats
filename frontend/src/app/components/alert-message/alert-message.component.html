@if (message) {
  <div class="p-4 rounded-xl text-sm flex items-center gap-3 animate-fade-in bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400">
    <span class="material-icons h-5 w-5 flex-shrink-0">error_outline</span>
    @if (message.includes('error.') || message.includes('app.')) {
      <span>{{ message | translate }}</span>
    } @else {
      <span>{{ message }}</span>
    }
  </div>
}
