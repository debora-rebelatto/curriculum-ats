@if (message) {
  <div class="p-4 rounded-xl text-sm flex items-center gap-3 animate-fade-in bg-error-50 dark:bg-error-900/30 border border-error-200 dark:border-error-800 text-error-700 dark:text-error-400">
    <span class="material-icons h-5 w-5 flex-shrink-0">error_outline</span>
    <span>{{ message | translate}}</span>
  </div>
}
