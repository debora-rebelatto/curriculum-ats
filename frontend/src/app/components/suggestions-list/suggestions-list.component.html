@if (suggestions.length) {
  <div class="glass-card p-6 md:p-8 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-slate-900/50 backdrop-blur-sm shadow-sm">

    <h3 class="text-xl font-outfit font-semibold text-slate-900 dark:text-white
               mb-6 flex items-center gap-3
               border-b border-slate-100 dark:border-slate-800 pb-4">
      <div class="w-10 h-10 rounded-xl bg-brand-100 dark:bg-brand-900/40
                  flex items-center justify-center
                  text-brand-600 dark:text-brand-400 shadow-sm border border-brand-200 dark:border-brand-800/50">
        <span class="material-icons text-[24px]">tips_and_updates</span>
      </div>
      {{ 'app.results.suggestionsTitle' | translate }}
    </h3>

    <div class="space-y-4">
      @for (suggestion of suggestions; track suggestion.title) {
        <suggestion-card [suggestion]="suggestion" />
      }
    </div>

  </div>
}
