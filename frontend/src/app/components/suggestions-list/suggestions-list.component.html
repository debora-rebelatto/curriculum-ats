@if (suggestions.length) {
  <div class="app-card p-6 md:p-8">
    <h3
      class="text-xl font-outfit font-semibold text-app-text mb-6 flex items-center gap-3 border-b border-app-border pb-4"
    >
      <div
        class="w-10 h-10 rounded-xl bg-brand-100 dark:bg-brand-900/40 flex items-center justify-center text-brand-600 dark:text-brand-400 shadow-sm border border-brand-200 dark:border-brand-800/50"
      >
        <span class="material-icons text-[24px]">tips_and_updates</span>
      </div>
      {{ 'app.results.suggestionsTitle' | translate }}
    </h3>

    <div class="space-y-4">
      @for (suggestion of suggestions; track suggestion.title) {
        <app-suggestion-card [suggestion]="suggestion" />
      }
    </div>
  </div>
}
