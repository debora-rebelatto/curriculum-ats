<div
  class="flex gap-2 mb-8 p-1 bg-slate-100/80 dark:bg-slate-900/50 rounded-xl w-full sm:w-max mx-auto md:mx-0 shadow-inner">
  <button class="flex-1 sm:flex-none px-6 py-2.5 text-sm font-medium rounded-lg transition-all duration-200"
    [ngClass]="activeTab === 'upload' ? 'bg-white dark:bg-slate-800 text-brand-600 dark:text-brand-400 shadow-sm ring-1 ring-slate-200 dark:ring-slate-700' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-800/50'"
    (click)="tabChange.emit('upload')">
    {{ 'app.tabs.upload' | translate }}
  </button>
  <button class="flex-1 sm:flex-none px-6 py-2.5 text-sm font-medium rounded-lg transition-all duration-200"
    [ngClass]="activeTab === 'paste' ? 'bg-white dark:bg-slate-800 text-brand-600 dark:text-brand-400 shadow-sm ring-1 ring-slate-200 dark:ring-slate-700' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-800/50'"
    (click)="tabChange.emit('paste')">
    {{ 'app.tabs.paste' | translate }}
  </button>
</div>
