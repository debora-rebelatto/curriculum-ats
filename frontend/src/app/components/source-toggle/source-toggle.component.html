<div class="relative flex p-1.5 bg-slate-100/80 dark:bg-slate-900/50 rounded-xl w-full sm:w-max mx-auto md:mx-0 shadow-inner overflow-hidden mb-8">
  <div class="absolute inset-y-1.5 left-1.5 w-[calc(50%-6px)] rounded-lg shadow-sm ring-1 ring-slate-200/50 dark:ring-slate-700/50 transition-all duration-300 ease-out z-0"
       [ngClass]="activeTab === 'upload' ? 'translate-x-0 bg-white dark:bg-slate-800' : 'translate-x-[calc(100%+6px)] bg-white dark:bg-slate-800'">
  </div>
  
  <button class="relative flex-1 sm:flex-none px-6 py-2 z-10 text-sm font-semibold rounded-lg transition-colors duration-200"
    [ngClass]="activeTab === 'upload' ? 'text-brand-600 dark:text-brand-400' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200'"
    (click)="tabChange.emit('upload')">
    {{ 'app.tabs.upload' | translate }}
  </button>
  
  <button class="relative flex-1 sm:flex-none px-6 py-2 z-10 text-sm font-semibold rounded-lg transition-colors duration-200"
    [ngClass]="activeTab === 'paste' ? 'text-brand-600 dark:text-brand-400' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200'"
    (click)="tabChange.emit('paste')">
    {{ 'app.tabs.paste' | translate }}
  </button>
</div>
