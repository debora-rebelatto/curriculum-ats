<div class="animate-fade-in">
  <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
    {{ 'app.form.resumeTextLabel' | translate }}
  </label>
  <textarea
    [ngModel]="resumeText"
    (ngModelChange)="resumeTextChange.emit($event)"
    rows="10"
    class="w-full rounded-xl border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:focus:ring-brand-400 dark:text-white p-4 transition-colors outline-none"
    [placeholder]="'app.form.resumeTextPlaceholder' | translate">
  </textarea>
</div>
