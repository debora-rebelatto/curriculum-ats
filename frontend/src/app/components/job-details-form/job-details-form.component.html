<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <div>
    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
      {{ 'app.form.jdLabel' | translate }}
    </label>
    <textarea
      [ngModel]="jdText"
      (ngModelChange)="jdTextChange.emit($event)"
      rows="4"
      class="w-full rounded-xl border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:text-white p-3 transition-colors outline-none"
      [placeholder]="'app.form.jdPlaceholder' | translate">
    </textarea>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
      {{ 'app.form.roleLabel' | translate }}
    </label>
    <textarea
      [ngModel]="roleText"
      (ngModelChange)="roleTextChange.emit($event)"
      rows="4"
      class="w-full rounded-xl border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 shadow-sm focus:border-brand-500 focus:ring-brand-500 dark:text-white p-3 transition-colors outline-none"
      [placeholder]="'app.form.rolePlaceholder' | translate">
    </textarea>
  </div>
</div>
