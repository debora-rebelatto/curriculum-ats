@if (suggestions.length) {
<div class="glass-card p-6 md:p-8">
  <h3
    class="text-xl font-outfit font-semibold text-slate-900 dark:text-white mb-6 flex items-center gap-3 border-b border-slate-100 dark:border-slate-800 pb-4">
    <div
      class="w-8 h-8 rounded-lg bg-brand-100 dark:bg-brand-900/40 flex items-center justify-center text-brand-600 dark:text-brand-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
          clip-rule="evenodd" />
      </svg>
    </div>
    {{ 'app.results.suggestionsTitle' | translate }}
  </h3>
  <div class="space-y-4">
    @for (s of suggestions; track s) {
    <div class="p-5 rounded-2xl border shadow-sm transition-all duration-300 hover:shadow-md" [ngClass]="{
           'bg-rose-50/50 dark:bg-rose-900/10 border-rose-200 dark:border-rose-800/50': s.priority === 'critical',
           'bg-amber-50/50 dark:bg-amber-900/10 border-amber-200 dark:border-amber-800/50': s.priority === 'warning',
           'bg-emerald-50/50 dark:bg-emerald-900/10 border-emerald-200 dark:border-emerald-800/50': s.priority === 'tip'
         }">
      <h5 class="font-semibold text-[15px] mb-2 flex items-center gap-2" [ngClass]="{
            'text-rose-900 dark:text-rose-400': s.priority === 'critical',
            'text-amber-900 dark:text-amber-400': s.priority === 'warning',
            'text-emerald-900 dark:text-emerald-400': s.priority === 'tip'
          }">
        <div class="flex items-center justify-center w-7 h-7 rounded-full shadow-sm" [ngClass]="{
               'bg-rose-100 dark:bg-rose-900/50': s.priority === 'critical',
               'bg-amber-100 dark:bg-amber-900/50': s.priority === 'warning',
               'bg-emerald-100 dark:bg-emerald-900/50': s.priority === 'tip'
             }">
          @if (s.priority === 'critical') {
          <span class="text-sm">🚨</span>
          }
          @if (s.priority === 'warning') {
          <span class="text-sm">⚠️</span>
          }
          @if (s.priority === 'tip') {
          <span class="text-sm">💡</span>
          }
        </div>
        {{ s.title }}
      </h5>
      <p class="text-[14.5px] leading-relaxed ml-9" [ngClass]="{
           'text-rose-800/90 dark:text-rose-200/80': s.priority === 'critical',
           'text-amber-800/90 dark:text-amber-200/80': s.priority === 'warning',
           'text-emerald-800/90 dark:text-emerald-200/80': s.priority === 'tip'
         }">
        {{ s.body }}
      </p>
      @if (s.example) {
      <div
        class="mt-3 ml-9 p-3 bg-white/50 dark:bg-slate-900/50 rounded-xl border border-slate-200/60 dark:border-slate-700/60">
        <span
          class="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider block mb-1.5">Exemplo
          na prática</span>
        <div class="text-[13.5px] text-slate-700 dark:text-slate-300 font-mono" [innerHTML]="s.example"></div>
      </div>
      }
    </div>
    }
  </div>
</div>
}
