<div class="app-card p-6 flex flex-col items-center justify-center text-center relative overflow-hidden group">
  <h4 class="text-xs font-semibold text-app-text3 uppercase tracking-wider mb-2 z-10">
    {{ title }}
  </h4>
  <div class="text-[3.5rem] leading-none font-outfit font-bold z-10" [ngClass]="getScoreColor(score)">
    {{ score !== null && score !== undefined ? score + '%' : '--' }}
  </div>
</div>
