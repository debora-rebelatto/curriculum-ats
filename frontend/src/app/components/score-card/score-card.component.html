<div class="glass-card p-6 flex flex-col items-center justify-center text-center relative overflow-hidden group">
  <div class="absolute w-24 h-24 rounded-full blur-2xl transition-all duration-500" [ngClass]="getBlobClasses()">
  </div>
  <h4 class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 z-10">
    {{ title }}
  </h4>
  <div class="text-[3.5rem] leading-none font-outfit font-bold z-10" [ngClass]="getScoreColor(score)">
    {{ score !== null && score !== undefined ? score + '%' : '--' }}
  </div>
</div>
