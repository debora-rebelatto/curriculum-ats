<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analisador ATS</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Analisador ATS</h1>
      <p class="subtitle">
        Analise seu currículo para sistemas de rastreamento de candidatos
      </p>

      <div id="form-view">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('upload')">
            Upload PDF
          </button>
          <button class="tab" onclick="switchTab('paste')">Colar texto</button>
        </div>
        <div class="input-panel">
          <div id="paste-panel" style="display: none">
            <label class="field-label">Currículo</label>
            <textarea
              id="resume-text"
              rows="9"
              placeholder="Cole o texto do seu currículo aqui..."
            ></textarea>
          </div>
          <div id="upload-panel">
            <label class="field-label">Currículo (PDF)</label>
            <div
              class="upload-zone"
              id="drop-zone"
              onclick="document.getElementById('file-input').click()"
            >
              <div class="upload-icon">📄</div>
              <div class="upload-text" id="upload-label">
                Clique ou arraste um arquivo PDF
              </div>
              <div class="upload-hint">Apenas .pdf</div>
            </div>
            <input
              type="file"
              id="file-input"
              accept=".pdf"
              onchange="handleFile(this)"
            />
          </div>
          <div class="row">
            <div>
              <label class="field-label">Descrição da vaga (opcional)</label>
              <textarea
                id="jd-text"
                rows="5"
                placeholder="Cole o job description para análise de compatibilidade..."
              ></textarea>
            </div>
            <div>
              <label class="field-label">Cargo / área alvo</label>
              <textarea
                id="role-text"
                rows="5"
                placeholder="Ex: Dev Frontend Angular, TypeScript, RxJS..."
              ></textarea>
            </div>
          </div>
          <div id="error-box" class="error-msg" style="display: none"></div>
          <button class="analyze-btn" onclick="analyze()">
            Analisar currículo
          </button>
        </div>
      </div>

      <div id="loading-view" class="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-msg">Analisando currículo...</div>
      </div>

      <div id="results-view" class="results">
        <div class="results-header">
          <button class="back-btn" onclick="goBack()">← Nova análise</button>
          <div class="export-actions">
            <button class="action-btn" onclick="exportImage()">
              🖼️ Salvar Imagem
            </button>
            <button class="action-btn" onclick="exportPDF()">
              📄 Salvar PDF
            </button>
          </div>
        </div>
        <div class="score-row" id="score-row"></div>
        <div class="section-card">
          <div class="section-title">Dimensões ATS</div>
          <div id="dimensions"></div>
        </div>
        <div class="section-card">
          <div class="section-title">Palavras-chave</div>
          <div style="margin-bottom: 12px">
            <div class="field-label" style="margin-bottom: 6px">
              Encontradas
            </div>
            <div class="tags" id="kw-found"></div>
          </div>
          <div>
            <div class="field-label" style="margin-bottom: 6px">
              Faltantes / recomendadas
            </div>
            <div class="tags" id="kw-missing"></div>
          </div>
        </div>
        <div class="section-card" id="jd-compat-card" style="display: none">
          <div class="section-title">Compatibilidade com a vaga</div>
          <div id="jd-compat"></div>
        </div>
        <div class="section-card">
          <div class="section-title">Sugestões de melhoria</div>
          <div class="suggestions" id="suggestions"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
