<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analisador ATS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #ebebea;
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #888780;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.2);
      --radius: 8px;
      --radius-lg: 12px;
      --green: #1D9E75;
      --amber: #BA7517;
      --red: #E24B4A;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg2: #2a2a28;
        --bg3: #333330;
        --text: #f0ede8;
        --text2: #b4b2a9;
        --text3: #888780;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
      }
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 820px; margin: 0 auto; }

    h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.25rem; }
    .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 2rem; }

    .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .tab {
      padding: 8px 18px; font-size: 14px;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      cursor: pointer; color: var(--text2); background: transparent;
      transition: all 0.15s;
    }
    .tab.active { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }
    .tab:hover:not(.active) { background: var(--bg2); }

    .input-panel { display: flex; flex-direction: column; gap: 1rem; }

    .field-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; }

    textarea {
      width: 100%; resize: vertical;
      font-family: inherit; font-size: 14px; line-height: 1.6;
      padding: 12px; border: 0.5px solid var(--border);
      border-radius: var(--radius); background: var(--bg);
      color: var(--text); transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: var(--border2); }

    .upload-zone {
      border: 1px dashed var(--border2); border-radius: var(--radius-lg);
      padding: 2rem; text-align: center; cursor: pointer; transition: all 0.15s;
    }
    .upload-zone:hover, .upload-zone.has-file {
      background: var(--bg2); border-style: solid; border-color: var(--border2);
    }
    .upload-icon { font-size: 22px; margin-bottom: 8px; }
    .upload-text { font-size: 14px; color: var(--text2); }
    .upload-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }
    #file-input { display: none; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .analyze-btn {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 500;
      background: var(--text); color: var(--bg);
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: opacity 0.15s; margin-top: 0.5rem;
    }
    .analyze-btn:hover { opacity: 0.85; }
    .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      font-size: 14px; color: #A32D2D; background: #FCEBEB;
      border: 0.5px solid #F7C1C1; border-radius: var(--radius); padding: 12px 16px;
    }

    .loading {
      display: none; flex-direction: column;
      align-items: center; gap: 1rem; padding: 4rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text2); }

    .results { display: none; flex-direction: column; gap: 1.5rem; }

    .back-btn {
      font-size: 13px; color: var(--text2); background: none;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      padding: 6px 14px; cursor: pointer; width: fit-content;
    }
    .back-btn:hover { background: var(--bg2); }

    .score-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .metric-card { background: var(--bg2); border-radius: var(--radius); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .metric-value { font-size: 26px; font-weight: 500; }
    .metric-value.good { color: var(--green); }
    .metric-value.ok { color: var(--amber); }
    .metric-value.bad { color: var(--red); }

    .section-card {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem;
    }
    .section-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; }

    .bar-wrap { margin-bottom: 10px; }
    .bar-label {
      font-size: 13px; color: var(--text2); margin-bottom: 4px;
      display: flex; justify-content: space-between;
    }
    .bar-bg { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
    .bar-fill.green { background: var(--green); }
    .bar-fill.amber { background: var(--amber); }
    .bar-fill.red { background: var(--red); }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; }
    .tag.found { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; }
    .tag.missing { background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F7C1C1; }

    .suggestions { display: flex; flex-direction: column; gap: 10px; }
    .suggestion {
      padding: 10px 12px; font-size: 13px; line-height: 1.6;
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .suggestion.critical { background: #FCEBEB; color: #791F1F; border-left: 3px solid var(--red); }
    .suggestion.warning { background: #FAEEDA; color: #633806; border-left: 3px solid var(--amber); }
    .suggestion.tip { background: #E1F5EE; color: #085041; border-left: 3px solid var(--green); }
    .suggestion strong { display: block; margin-bottom: 2px; }

    @media (max-width: 600px) {
      .row { grid-template-columns: 1fr; }
      .score-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Analisador ATS</h1>
    <p class="subtitle">Analise seu currículo para sistemas de rastreamento de candidatos</p>

    <div id="form-view">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('paste')">Colar texto</button>
        <button class="tab" onclick="switchTab('upload')">Upload PDF</button>
      </div>
      <div class="input-panel">
        <div id="paste-panel">
          <label class="field-label">Currículo</label>
          <textarea id="resume-text" rows="9" placeholder="Cole o texto do seu currículo aqui..."></textarea>
        </div>
        <div id="upload-panel" style="display:none">
          <label class="field-label">Currículo (PDF)</label>
          <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="upload-icon">📄</div>
            <div class="upload-text" id="upload-label">Clique ou arraste um arquivo PDF</div>
            <div class="upload-hint">Apenas .pdf</div>
          </div>
          <input type="file" id="file-input" accept=".pdf" onchange="handleFile(this)">
        </div>
        <div class="row">
          <div>
            <label class="field-label">Descrição da vaga (opcional)</label>
            <textarea id="jd-text" rows="5" placeholder="Cole o job description para análise de compatibilidade..."></textarea>
          </div>
          <div>
            <label class="field-label">Cargo / área alvo</label>
            <textarea id="role-text" rows="5" placeholder="Ex: Dev Frontend Angular, TypeScript, RxJS..."></textarea>
          </div>
        </div>
        <div id="error-box" class="error-msg" style="display:none"></div>
        <button class="analyze-btn" onclick="analyze()">Analisar currículo</button>
      </div>
    </div>

    <div id="loading-view" class="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-msg">Analisando currículo...</div>
    </div>

    <div id="results-view" class="results">
      <button class="back-btn" onclick="goBack()">← Nova análise</button>
      <div class="score-row" id="score-row"></div>
      <div class="section-card">
        <div class="section-title">Dimensões ATS</div>
        <div id="dimensions"></div>
      </div>
      <div class="section-card">
        <div class="section-title">Palavras-chave</div>
        <div style="margin-bottom:12px">
          <div class="field-label" style="margin-bottom:6px">Encontradas</div>
          <div class="tags" id="kw-found"></div>
        </div>
        <div>
          <div class="field-label" style="margin-bottom:6px">Faltantes / recomendadas</div>
          <div class="tags" id="kw-missing"></div>
        </div>
      </div>
      <div class="section-card" id="jd-compat-card" style="display:none">
        <div class="section-title">Compatibilidade com a vaga</div>
        <div id="jd-compat"></div>
      </div>
      <div class="section-card">
        <div class="section-title">Sugestões de melhoria</div>
        <div class="suggestions" id="suggestions"></div>
      </div>
    </div>
  </div>

  <script>
    let pdfBase64 = null;
    let activeTab = 'paste';
    let msgInterval;
    const loadingMsgs = ["Lendo o currículo...", "Identificando palavras-chave...", "Calculando score ATS...", "Gerando sugestões..."];
    let msgIdx = 0;

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['paste','upload'][i] === tab));
      document.getElementById('paste-panel').style.display = tab === 'paste' ? 'block' : 'none';
      document.getElementById('upload-panel').style.display = tab === 'upload' ? 'block' : 'none';
    }

    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('upload-label').textContent = file.name;
      document.getElementById('drop-zone').classList.add('has-file');
      const reader = new FileReader();
      reader.onload = e => { pdfBase64 = e.target.result.split(',')[1]; };
      reader.readAsDataURL(file);
    }

    function show(id) {
      const display = { 'form-view': 'block', 'loading-view': 'flex', 'results-view': 'flex' };
      Object.keys(display).forEach(v => {
        document.getElementById(v).style.display = v === id ? display[v] : 'none';
      });
    }

    function goBack() { clearInterval(msgInterval); show('form-view'); }

    function startLoading() {
      msgIdx = 0;
      document.getElementById('loading-msg').textContent = loadingMsgs[0];
      msgInterval = setInterval(() => {
        msgIdx = (msgIdx + 1) % loadingMsgs.length;
        document.getElementById('loading-msg').textContent = loadingMsgs[msgIdx];
      }, 2500);
      show('loading-view');
    }

    function colorClass(s) { return s >= 75 ? 'good' : s >= 50 ? 'ok' : 'bad'; }
    function barClass(s) { return s >= 75 ? 'green' : s >= 50 ? 'amber' : 'red'; }

    function renderResults(data) {
      clearInterval(msgInterval);
      const metrics = [
        { label: 'Score ATS geral', value: data.ats_score },
        { label: 'Legibilidade', value: data.readability_score },
        { label: 'Compatibilidade com vaga', value: data.job_match_score }
      ];
      document.getElementById('score-row').innerHTML = metrics.map(m => {
        const v = (m.value !== null && m.value !== undefined) ? m.value + '%' : 'N/A';
        const cls = typeof m.value === 'number' ? colorClass(m.value) : '';
        return `<div class="metric-card"><div class="metric-label">${m.label}</div><div class="metric-value ${cls}">${v}</div></div>`;
      }).join('');

      document.getElementById('dimensions').innerHTML = (data.dimensions || []).map(d =>
        `<div class="bar-wrap"><div class="bar-label"><span>${d.name}</span><span>${d.score}%</span></div><div class="bar-bg"><div class="bar-fill ${barClass(d.score)}" style="width:${d.score}%"></div></div></div>`
      ).join('');

      document.getElementById('kw-found').innerHTML = (data.keywords_found || []).map(k => `<span class="tag found">${k}</span>`).join('') || '<span style="font-size:13px;color:var(--text3)">Nenhuma identificada</span>';
      document.getElementById('kw-missing').innerHTML = (data.keywords_missing || []).map(k => `<span class="tag missing">${k}</span>`).join('') || '<span style="font-size:13px;color:var(--text3)">Nenhuma</span>';

      const jdCard = document.getElementById('jd-compat-card');
      if (data.job_match_details) {
        jdCard.style.display = 'block';
        document.getElementById('jd-compat').innerHTML = `<p style="font-size:14px;line-height:1.7;color:var(--text2)">${data.job_match_details}</p>`;
      } else {
        jdCard.style.display = 'none';
      }

      document.getElementById('suggestions').innerHTML = (data.suggestions || []).map(s =>
        `<div class="suggestion ${s.priority}"><strong>${s.title}</strong>${s.body}</div>`
      ).join('');

      show('results-view');
    }

    async function analyze() {
      const errBox = document.getElementById('error-box');
      errBox.style.display = 'none';
      const resumeText = document.getElementById('resume-text').value.trim();

      if (activeTab === 'paste' && !resumeText) {
        errBox.textContent = 'Cole o texto do currículo antes de analisar.';
        errBox.style.display = 'block'; return;
      }
      if (activeTab === 'upload' && !pdfBase64) {
        errBox.textContent = 'Selecione um arquivo PDF antes de analisar.';
        errBox.style.display = 'block'; return;
      }

      startLoading();

      const jd = document.getElementById('jd-text').value.trim();
      const role = document.getElementById('role-text').value.trim();

      const systemPrompt = `Você é um especialista em recrutamento e sistemas ATS. Analise o currículo fornecido e retorne SOMENTE um objeto JSON válido, sem markdown, sem backticks, sem texto extra.

Estrutura obrigatória:
{
  "ats_score": <inteiro 0-100>,
  "readability_score": <inteiro 0-100>,
  "job_match_score": <inteiro 0-100 ou null se não houver JD>,
  "dimensions": [
    {"name": "Formatação e parseabilidade", "score": <0-100>},
    {"name": "Uso de palavras-chave", "score": <0-100>},
    {"name": "Estrutura e seções", "score": <0-100>},
    {"name": "Quantificação de resultados", "score": <0-100>},
    {"name": "Clareza e objetividade", "score": <0-100>}
  ],
  "keywords_found": [<até 12 palavras-chave presentes>],
  "keywords_missing": [<até 12 palavras-chave ausentes importantes para o cargo>],
  "job_match_details": <string descritiva ou null>,
  "suggestions": [
    {"priority": "critical"|"warning"|"tip", "title": "<título curto>", "body": "<explicação>"}
  ]
}

Inclua 2-3 itens de cada prioridade. Responda em português brasileiro. Retorne APENAS o JSON.`;

      let userContent = [];
      if (activeTab === 'upload' && pdfBase64) {
        userContent.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 } });
        userContent.push({ type: 'text', text: `Analise este currículo.${role ? '\nCargo alvo: ' + role : ''}${jd ? '\nDescrição da vaga:\n' + jd : ''}` });
      } else {
        userContent.push({ type: 'text', text: `Analise este currículo:\n\n${resumeText}${role ? '\n\nCargo alvo: ' + role : ''}${jd ? '\n\nDescrição da vaga:\n' + jd : ''}` });
      }

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1500,
            system: systemPrompt,
            messages: [{ role: 'user', content: userContent }]
          })
        });

        const raw = await res.json();
        if (!res.ok) throw new Error(raw.error || `HTTP ${res.status}`);

        const text = (raw.content || []).map(b => b.text || '').join('').trim();
        const clean = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
        const data = JSON.parse(clean);
        renderResults(data);
      } catch (e) {
        clearInterval(msgInterval);
        show('form-view');
        errBox.textContent = 'Erro ao analisar: ' + e.message;
        errBox.style.display = 'block';
      }
    }
  </script>
</body>
</html>
